<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Escolar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f1e8; --card:#fff; --ink:#1a1a2e; --ink2:#4a4a5e; --muted:#8a8a9a;
  --line:#e8e2d3; --accent:#c94444; --accent2:#185FA5; --green:#2a7a4b; --orange:#d68a2a;
  --red:#c8422a; --yellow:#f0c030; --soft:#faf7ee;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',system-ui,sans-serif}
body{background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px}
h1,h2,h3,.serif{font-family:'DM Serif Display',serif;font-weight:400}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
.hidden{display:none!important}

/* ── LANDING ─────────────────────────────── */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;background:linear-gradient(135deg,#f5f1e8 0%,#ebe4d0 100%)}
.landing-header{text-align:center;margin-bottom:3rem}
.landing-header h1{font-size:3rem;color:var(--ink);margin-bottom:.5rem}
.landing-header p{color:var(--ink2);font-size:1.1rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;max-width:960px;width:100%}
.role-card{background:var(--card);border-radius:20px;padding:2.5rem 1.8rem;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.08);cursor:pointer;transition:all .25s;border:2px solid transparent}
.role-card:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(0,0,0,.12);border-color:var(--accent)}
.role-card .icon{font-size:3.2rem;margin-bottom:1rem}
.role-card h2{font-size:1.6rem;margin-bottom:.5rem}
.role-card p{color:var(--muted);font-size:.95rem;margin-bottom:1.3rem;min-height:2.6em}
.role-card .form-area{display:flex;flex-direction:column;gap:.6rem;margin-top:1rem}
.role-card input{padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;outline:none;text-align:center;background:var(--soft)}
.role-card input:focus{border-color:var(--accent)}
.role-card .btn-enter{background:var(--ink);color:#fff;padding:11px;border-radius:10px;font-weight:600;margin-top:.4rem;transition:background .2s}
.role-card .btn-enter:hover{background:var(--accent)}
.role-card .err{color:var(--red);font-size:.82rem;min-height:1em}

/* ── APP SHELL ─────────────────────────────── */
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--ink);color:#fff;padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.topbar .brand{font-family:'DM Serif Display',serif;font-size:1.4rem;display:flex;align-items:center;gap:.6rem}
.topbar .user{display:flex;align-items:center;gap:1rem;font-size:.9rem}
.topbar .btn-logout{background:rgba(255,255,255,.1);color:#fff;padding:7px 14px;border-radius:8px;font-size:.82rem;transition:background .2s}
.topbar .btn-logout:hover{background:var(--accent)}
.conn-dot{display:inline-flex;align-items:center;gap:.4rem;padding:4px 10px;background:rgba(255,255,255,.08);border-radius:100px;font-size:.75rem}
.conn-dot .dot{width:8px;height:8px;border-radius:50%;background:#888;transition:background .3s}
.conn-dot.online .dot{background:#4ade80;box-shadow:0 0 6px #4ade80}
.conn-dot.offline .dot{background:#f87171}
.conn-dot.connecting .dot{background:#fbbf24;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{background:var(--soft);border-bottom:1.5px solid var(--line);padding:0 1.5rem;display:flex;gap:.2rem;overflow-x:auto}
.tab{padding:.85rem 1.2rem;color:var(--ink2);border-bottom:3px solid transparent;white-space:nowrap;font-weight:500;transition:all .2s;font-size:.9rem}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{flex:1;padding:1.8rem;max-width:1200px;margin:0 auto;width:100%}

/* ── CARDS & FORMS ─────────────────────────────── */
.panel{background:var(--card);border-radius:14px;padding:1.6rem;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:1.2rem}
.panel h3{font-family:'DM Sans',sans-serif;font-weight:600;font-size:1.05rem;margin-bottom:1rem;color:var(--ink);display:flex;align-items:center;gap:.5rem}
.panel p.sub{color:var(--muted);font-size:.88rem;margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:.35rem}
.form-group label{font-size:.78rem;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{padding:10px 13px;border:1.5px solid var(--line);border-radius:9px;background:var(--soft);outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent2);background:#fff}
.form-group textarea{resize:vertical;min-height:70px;font-family:inherit}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:10px 18px;border-radius:9px;font-weight:600;font-size:.88rem;transition:all .2s;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#a33333}
.btn-sec{background:var(--soft);color:var(--ink);border:1.5px solid var(--line)}
.btn-sec:hover{background:var(--line)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#1e5a37}
.btn-blue{background:var(--accent2);color:#fff}
.btn-blue:hover{background:#0f4680}
.btn-danger{background:#fff0f0;color:var(--red);border:1.5px solid #f5c6cb}
.btn-danger:hover{background:#ffd6d6}
.btn-small{padding:6px 12px;font-size:.78rem;border-radius:7px}
.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem}

/* ── LISTS ─────────────────────────────── */
.item-list{display:flex;flex-direction:column;gap:.6rem}
.item{background:var(--soft);border:1.5px solid var(--line);border-radius:11px;padding:1rem 1.1rem;display:flex;align-items:center;gap:1rem;transition:all .2s}
.item:hover{border-color:var(--accent2);background:#fff}
.item .i-icon{font-size:1.6rem;flex-shrink:0}
.item .i-body{flex:1;min-width:0}
.item .i-title{font-weight:600;color:var(--ink);margin-bottom:.15rem;word-break:break-word}
.item .i-meta{font-size:.78rem;color:var(--muted);display:flex;gap:.7rem;flex-wrap:wrap}
.item .i-meta span{display:inline-flex;align-items:center;gap:.25rem}
.item .i-actions{display:flex;gap:.4rem;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:.25rem;padding:2px 9px;border-radius:100px;font-size:.72rem;font-weight:600}
.pill-on{background:#d8f0df;color:var(--green)}
.pill-off{background:#f0e2d8;color:#8a6030}
.pill-grado{background:#e0ecff;color:var(--accent2)}
.pill-grupo{background:#ffe8d8;color:var(--orange)}

/* ── TOGGLE SWITCH ─────────────────────────────── */
.switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:24px;transition:.3s}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.switch input:checked+.slider{background:var(--green)}
.switch input:checked+.slider:before{transform:translateX(20px)}

/* ── EMPTY STATE ─────────────────────────────── */
.empty{text-align:center;padding:3rem 1.5rem;color:var(--muted)}
.empty .big{font-size:3rem;margin-bottom:.8rem}
.empty p{font-size:.95rem}

/* ── TOAST ─────────────────────────────── */
.toast{position:fixed;top:20px;right:20px;background:var(--ink);color:#fff;padding:13px 20px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:9999;animation:slidein .3s ease-out;font-size:.9rem;max-width:320px}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
@keyframes slidein{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── MODAL ─────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:14px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.modal-head{padding:1.2rem 1.5rem;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-family:'DM Sans',sans-serif;font-weight:600;font-size:1.1rem}
.modal-body{padding:1.5rem}
.modal-close{font-size:1.6rem;color:var(--muted);cursor:pointer;padding:0 .4rem;line-height:1}
.modal-close:hover{color:var(--red)}
  /* ── GAME MODAL (resizable & fullscreen) ─────────────────────────────── */
.game-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(4px)}
.game-modal{position:relative;background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.4);display:flex;flex-direction:column;overflow:hidden;width:90vw;height:85vh;max-width:1400px;min-width:320px;min-height:300px;transition:all .2s ease}
.game-modal.maximized{width:100vw!important;height:100vh!important;max-width:none;border-radius:0;top:0!important;left:0!important;transform:none!important}
.game-modal-head{background:var(--ink);color:#fff;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;cursor:move;user-select:none;flex-shrink:0}
.game-modal-head h3{font-family:'DM Sans',sans-serif;font-weight:600;font-size:1rem;color:#fff;margin:0}
.game-modal-controls{display:flex;gap:.4rem;align-items:center}
.gm-btn{background:rgba(255,255,255,.12);color:#fff;border:none;width:32px;height:28px;border-radius:6px;cursor:pointer;font-size:.95rem;transition:background .15s;display:inline-flex;align-items:center;justify-content:center;padding:0}
.gm-btn:hover{background:rgba(255,255,255,.25)}
.gm-btn.close:hover{background:var(--red)}
.game-modal-body{flex:1;overflow:hidden;position:relative;background:#f5f5f5}
.game-modal-body iframe{width:100%;height:100%;border:none;display:block}
/* Resize handles (esquinas y bordes) */
.gm-resize{position:absolute;z-index:10}
.gm-resize.n{top:-3px;left:10px;right:10px;height:6px;cursor:n-resize}
.gm-resize.s{bottom:-3px;left:10px;right:10px;height:6px;cursor:s-resize}
.gm-resize.e{top:10px;bottom:10px;right:-3px;width:6px;cursor:e-resize}
.gm-resize.w{top:10px;bottom:10px;left:-3px;width:6px;cursor:w-resize}
.gm-resize.ne{top:-3px;right:-3px;width:14px;height:14px;cursor:ne-resize}
.gm-resize.nw{top:-3px;left:-3px;width:14px;height:14px;cursor:nw-resize}
.gm-resize.se{bottom:-3px;right:-3px;width:14px;height:14px;cursor:se-resize}
.gm-resize.sw{bottom:-3px;left:-3px;width:14px;height:14px;cursor:sw-resize}
.gm-resize.se::after{content:'';position:absolute;right:3px;bottom:3px;width:8px;height:8px;border-right:2px solid var(--accent);border-bottom:2px solid var(--accent);border-bottom-right-radius:3px}
.game-modal.maximized .gm-resize{display:none}
@media(max-width:640px){.game-modal{width:100vw;height:100vh;border-radius:0}.gm-resize{display:none}}

/* ── GRADES TABLE (PARENT/STUDENT VIEW) ─────────────────────────────── */
.grades-wrap{overflow-x:auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:1.2rem}
.grades-table{width:100%;border-collapse:collapse;min-width:600px}
.grades-table th{background:var(--ink);color:#fff;padding:.85rem .6rem;text-align:left;font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.03em}
.grades-table th.num{text-align:center;writing-mode:vertical-rl;transform:rotate(180deg);font-size:.73rem;padding:.7rem .35rem;min-width:34px;max-width:38px}
.grades-table th.final{background:var(--green);text-align:center;writing-mode:vertical-rl;transform:rotate(180deg)}
.grades-table td{padding:.8rem .6rem;border-bottom:1px solid var(--line);font-size:.88rem}
.grades-table td.num{text-align:center;font-weight:500}
.grades-table td.final{text-align:center;font-weight:700;background:#f2fbf5}
.grades-table .final-chip{display:inline-block;background:#d8f0df;color:var(--green);padding:4px 12px;border-radius:100px;font-weight:700}
.grades-table .low{background:#ffeaea;color:var(--red)}

/* ── STATS ─────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.2rem}
.stat{background:var(--card);border-radius:12px;padding:1.2rem;box-shadow:0 2px 10px rgba(0,0,0,.05);border-left:4px solid var(--accent2)}
.stat.green{border-left-color:var(--green)}
.stat.orange{border-left-color:var(--orange)}
.stat.red{border-left-color:var(--red)}
.stat .label{font-size:.75rem;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.04em;margin-bottom:.3rem}
.stat .value{font-size:1.9rem;font-weight:700;color:var(--ink);line-height:1.1}
.stat .sub{font-size:.8rem;color:var(--muted);margin-top:.2rem}

/* ── STUDENT DASHBOARD MATERIAL CARDS ─────────────────────────────── */
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.mat-card{background:#fff;border-radius:12px;padding:1.3rem;box-shadow:0 2px 12px rgba(0,0,0,.05);transition:all .25s;border:2px solid transparent;cursor:pointer}
.mat-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.1);border-color:var(--accent)}
.mat-card .m-icon{font-size:2.4rem;margin-bottom:.6rem}
.mat-card h4{font-size:1.02rem;margin-bottom:.3rem;color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:600}
.mat-card .m-desc{font-size:.82rem;color:var(--muted);margin-bottom:.8rem;min-height:2.4em}
.mat-card .m-type{display:inline-block;background:var(--soft);color:var(--ink2);padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:600}

/* ── EXAM ─────────────────────────────── */
.exam-q{background:var(--soft);border:1.5px solid var(--line);border-radius:11px;padding:1.2rem;margin-bottom:1rem}
.exam-q h4{font-weight:600;margin-bottom:.8rem;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.98rem}
.exam-opts{display:flex;flex-direction:column;gap:.5rem}
.exam-opt{display:flex;align-items:center;gap:.7rem;padding:10px 14px;background:#fff;border:1.5px solid var(--line);border-radius:9px;cursor:pointer;transition:all .2s}
.exam-opt:hover{border-color:var(--accent2)}
.exam-opt.selected{border-color:var(--accent2);background:#e7f0fc}
.exam-opt input[type=radio]{accent-color:var(--accent2)}
.exam-opt.correct{border-color:var(--green);background:#d8f0df}
.exam-opt.wrong{border-color:var(--red);background:#ffeaea}

@media(max-width:640px){
  .form-row,.form-row.triple{grid-template-columns:1fr}
  .content{padding:1rem}
  .landing-header h1{font-size:2.2rem}
  .role-card{padding:2rem 1.4rem}
  .topbar{padding:.7rem 1rem}
  .topbar .brand{font-size:1.1rem}
  .tabs{padding:0 .8rem}
}

/* ═══════════ PARENT MODE — youthful, animated, formal ═══════════ */
body.parent-mode{
  background:linear-gradient(135deg,#1e3c72 0%,#2a5298 25%,#7e22ce 50%,#2a5298 75%,#1e3c72 100%);
  background-size:400% 400%;
  animation:parentBgShift 18s ease infinite;
}
@keyframes parentBgShift{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
body.parent-mode .topbar{
  background:rgba(15,23,42,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}
body.parent-mode .tabs{
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.2);
}
body.parent-mode .content{
  background:transparent;
}
body.parent-mode .panel{
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.4);
  box-shadow:0 8px 32px rgba(15,23,42,0.18), 0 2px 8px rgba(0,0,0,0.04);
  animation:parentFadeIn .5s cubic-bezier(.2,.8,.2,1) backwards;
  transition:transform .25s ease, box-shadow .25s ease;
}
body.parent-mode .panel:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(15,23,42,0.25), 0 4px 12px rgba(0,0,0,0.08);
}
body.parent-mode .panel:nth-child(1){animation-delay:0s}
body.parent-mode .panel:nth-child(2){animation-delay:.08s}
body.parent-mode .panel:nth-child(3){animation-delay:.16s}
body.parent-mode .panel:nth-child(4){animation-delay:.24s}
body.parent-mode .panel:nth-child(5){animation-delay:.32s}
body.parent-mode .panel:nth-child(6){animation-delay:.4s}
body.parent-mode .panel:nth-child(n+7){animation-delay:.48s}
@keyframes parentFadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* Trimester chips — colorful, no more gray */
.trim-chip{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:4px 12px;border-radius:100px;
  font-size:.75rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;
  color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
  vertical-align:middle;
  margin-left:.5rem;
  transition:transform .2s ease;
}
.trim-chip:hover{transform:scale(1.06)}
.trim-chip.t1{background:linear-gradient(135deg,#3b82f6,#1e40af);box-shadow:0 2px 12px rgba(59,130,246,.4)}
.trim-chip.t2{background:linear-gradient(135deg,#10b981,#047857);box-shadow:0 2px 12px rgba(16,185,129,.4)}
.trim-chip.t3{background:linear-gradient(135deg,#f59e0b,#b45309);box-shadow:0 2px 12px rgba(245,158,11,.4)}
.trim-chip.tx{background:linear-gradient(135deg,#64748b,#334155)}
.subj-chip{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:4px 12px;border-radius:100px;
  font-size:.72rem;font-weight:600;
  background:linear-gradient(135deg,#6366f1,#4338ca);
  color:#fff;
  vertical-align:middle;
  margin-left:.4rem;
}

/* Live update indicator */
.live-pill{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:4px 11px;border-radius:100px;
  background:linear-gradient(135deg,#10b981,#047857);
  color:#fff;font-size:.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  box-shadow:0 0 0 0 rgba(16,185,129,0.6);
  animation:livePulse 2.4s ease-in-out infinite;
}
.live-pill .live-dot{
  width:7px;height:7px;border-radius:50%;
  background:#fff;
  animation:liveDotBlink 2.4s ease-in-out infinite;
}
@keyframes livePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.5)}
  50%{box-shadow:0 0 0 8px rgba(16,185,129,0)}
}
@keyframes liveDotBlink{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.6;transform:scale(.85)}
}

/* Flash on update */
.flash-update{
  animation:flashGlow 1.2s ease-out;
}
@keyframes flashGlow{
  0%{box-shadow:0 0 0 3px rgba(16,185,129,0.6), 0 8px 32px rgba(15,23,42,0.18)}
  100%{box-shadow:0 0 0 0 rgba(16,185,129,0), 0 8px 32px rgba(15,23,42,0.18)}
}

/* Parent grades table styling */
body.parent-mode .grades-table th{
  background:linear-gradient(135deg,#1e293b,#334155);
  font-size:.74rem;
}
body.parent-mode .grades-table th .trim-chip{margin-left:0}
body.parent-mode .grades-table th.final{
  background:linear-gradient(135deg,#10b981,#047857);
}
body.parent-mode .grades-table td.final{
  background:linear-gradient(180deg,#ecfdf5,#d1fae5);
}
body.parent-mode .grades-table .final-chip{
  background:linear-gradient(135deg,#10b981,#047857);
  color:#fff;
  box-shadow:0 2px 8px rgba(16,185,129,0.35);
  font-size:.95rem;padding:5px 14px;
}
body.parent-mode .grades-table td.num.low{
  background:#fee2e2;
  color:#991b1b;
  font-weight:700;
}

/* Parent stat cards */
body.parent-mode .stat{
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(10px);
  border:none;
  box-shadow:0 6px 20px rgba(15,23,42,0.12);
  transition:transform .25s ease;
}
body.parent-mode .stat:hover{transform:translateY(-3px) scale(1.02)}
body.parent-mode .stat .value{

<script>
/* ═══════════════════════════════════════════════════════════
   PORTAL ESCOLAR
   Complementa el Registro de Calificaciones del maestro.
   Datos del portal: localStorage 'portal_v1'
   Datos del registro (importados): dentro de portal.calif
═══════════════════════════════════════════════════════════ */

const STORE_KEY = 'portal_v1';
const TEACHER_USER = 'admin';
const TEACHER_PASS = '182136';

// ── State ─────────────────────────────────────
let portal = {
  materials: [],      // [{id,type,title,desc,grado,grupo,content,createdAt,visible}]
  exams: [],          // [{id,title,desc,grado,grupo,questions:[{q,opts:[],correct}],visible}]
  calif: null,        // imported JSON from Registro (contains .groups)
  examResults: []     // [{studentCode,studentName,examId,score,total,date}]
};
let session = null;   // {role,label} | null

function saveStore(){ localStorage.setItem(STORE_KEY, JSON.stringify(portal)); syncToFirebase(); }
function loadStore(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){
      const p = JSON.parse(raw);
      portal = {...portal, ...p};
      if(!portal.materials) portal.materials = [];
      if(!portal.exams) portal.exams = [];
      if(!portal.examResults) portal.examResults = [];
    }
  }catch(e){console.error(e)}
}
loadStore();

/* ═══════════════════════════════════════════
   FIREBASE SYNC
═══════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyCkgxH-6KUE0v1I0xzvVTuj1VP9Pw4bwWA",
  authDomain: "registro-de-calificacion-42ca0.firebaseapp.com",
  databaseURL: "https://registro-de-calificacion-42ca0-default-rtdb.firebaseio.com",
  projectId: "registro-de-calificacion-42ca0",
  storageBucket: "registro-de-calificacion-42ca0.firebasestorage.app",

let fbApp=null, fbDb=null, fbConnected=false, fbReady=false;
let syncTimer=null, suppressSync=false;

function setConnState(state, label){
  ['connDot','landingConn'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.classList.remove('online','offline','connecting');
    el.classList.add(state);
  });
  ['connLabel','landingConnLabel'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.textContent = label;
  });
}

// Load Firebase SDK with multiple CDN fallbacks
function loadFirebaseSDK(){
  return new Promise((resolve, reject) => {
    if(typeof firebase !== 'undefined' && firebase.database){ resolve(); return; }
    const cdns = [
      'https://www.gstatic.com/firebasejs/12.11.0/',
      'https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/',
      'https://www.gstatic.com/firebasejs/10.14.1/',
      'https://cdnjs.cloudflare.com/ajax/libs/firebase/10.14.1/'
    ];
    let idx = 0;
    function tryNext(){
      if(idx >= cdns.length){ reject(new Error('Todos los CDNs fallaron')); return; }
      const base = cdns[idx++];
      console.log('[Firebase] Intentando cargar desde', base);
      setConnState('connecting', 'Cargando SDK…');
      const s1 = document.createElement('script');
      s1.src = base + 'firebase-app-compat.js';
      s1.onload = () => {
        const s2 = document.createElement('script');
        s2.src = base + 'firebase-database-compat.js';
        s2.onload = () => {
          if(typeof firebase !== 'undefined' && firebase.database){
            console.log('[Firebase] Cargado exitosamente desde', base);
            resolve();
          } else {
            console.warn('[Firebase] Script cargó pero firebase no está definido en', base);
            tryNext();
          }
        };
        s2.onerror = () => { console.warn('[Firebase] Falló database-compat de', base); tryNext(); };
        document.head.appendChild(s2);
      };
      s1.onerror = () => { console.warn('[Firebase] Falló app-compat de', base); tryNext(); };
      document.head.appendChild(s1);
    }
    tryNext();
  });
}

function initFirebase(){
  setConnState('connecting', 'Cargando Firebase…');
  loadFirebaseSDK().then(() => {
    try{
      fbApp = firebase.initializeApp(firebaseConfig);
      fbDb = firebase.database();
      fbReady = true;
      fbDb.ref('.info/connected').on('value', snap=>{
        fbConnected = !!snap.val();
        if(fbConnected){
          setConnState('online','En línea');
          subscribeFirebase();
        } else {
          setConnState('offline','Sin conexión');
        }
      });
    }catch(err){
      console.error('Firebase init error',err);
      setConnState('offline','Error: '+err.message);
    }
  }).catch(err => {
    console.error('No se pudo cargar Firebase SDK desde ningún CDN:', err);
    setConnState('offline','SDK no disponible (sin internet)');
  });
}

function subscribeFirebase(){
  if(!fbReady) return;
  // Teacher data (materials, exams, calif)
  fbDb.ref('portal/data').on('value', snap=>{
    const v = snap.val();
    if(v){
      suppressSync = true;
      portal.materials = v.materials || [];
      portal.exams = v.exams || [];
      // Only overwrite calif from portal/data if calificaciones/data hasn't pushed yet
      if(v.calif && !portal._califFromRegistro) portal.calif = v.calif;
      localStorage.setItem(STORE_KEY, JSON.stringify(portal));
      suppressSync = false;
      if(session && (session.role==='teacher' || session.role==='student' || session.role==='parent')){
        if(session.role==='teacher') renderTeacherContent();
        else if(session.role==='student') renderStudentContent();
        else if(session.role==='parent') renderParentContent();
      }
    }
  });
  // ── REAL-TIME from Registro de Calificaciones ──
  // Index.html publica los datos completos en calificaciones/data
  // cuando guarda. Si está configurado al MISMO Firebase project, los
  // padres/alumnos ven los cambios en vivo sin recargar la página.
  fbDb.ref('calificaciones/data').on('value', snap=>{
    const v = snap.val();
    if(v && v.groups && Array.isArray(v.groups)){
      const isFirstLoad = !portal.calif;
      suppressSync = true;
      portal.calif = {
        groups: v.groups,
        importedAt: new Date().toISOString(),
        _liveSync: true
      };
      portal._califFromRegistro = true;
      localStorage.setItem(STORE_KEY, JSON.stringify(portal));
      suppressSync = false;
      if(session){
        if(session.role==='parent') {
          renderParentContent();
          if(!isFirstLoad) flashUpdate();
        }
        else if(session.role==='student') {
          renderStudentContent();
          if(!isFirstLoad) flashUpdate();
        }
        else if(session.role==='teacher') renderTeacherContent();
      }
    }
  });
  // Exam results (separate path for atomic pushes)
  fbDb.ref('portal/results').on('value', snap=>{
    const v = snap.val();
    if(v){
      suppressSync = true;
      portal.examResults = Object.values(v);
      localStorage.setItem(STORE_KEY, JSON.stringify(portal));
      suppressSync = false;
      if(session && session.role==='teacher') renderTeacherContent();
      if(session && session.role==='student') renderStudentContent();
    } else {
      portal.examResults = [];
    }
  });
}

// Live flash when remote data updates
function flashUpdate(){
  toast('📊 Datos actualizados en vivo','success');
  // Pulse all visible panels
  setTimeout(()=>{
    document.querySelectorAll('.content .panel').forEach(p=>{
      p.classList.remove('flash-update');
      void p.offsetWidth; // restart animation
      p.classList.add('flash-update');
    });
  }, 30);
}

function syncToFirebase(immediate){
  if(!fbReady || !fbConnected || suppressSync) return;
  // Only teachers push to Firebase
  if(!session || session.role!=='teacher') return;
  clearTimeout(syncTimer);
  const doSync = ()=>{
    fbDb.ref('portal/data').set({
      materials: portal.materials || [],
      exams: portal.exams || [],
      calif: portal.calif || null,
      updatedAt: Date.now()
    }).catch(err=>{
      console.error('Sync error',err);
      toast('Error al sincronizar con Firebase','error');
    });
  };
  if(immediate) doSync();
  else syncTimer = setTimeout(doSync, 800); // debounce
}

function pushExamResult(result){
  if(fbReady && fbConnected){
    fbDb.ref('portal/results').push(result).catch(err=>{
      console.error('Push result error',err);
    });
  }
}

function forcePublish(){
  if(!fbReady){ toast('Firebase no se inicializó','error'); return; }
  if(!fbConnected){ toast('Sin conexión a Firebase','error'); return; }
  fbDb.ref('portal/data').set({
    materials: portal.materials || [],
    exams: portal.exams || [],
    calif: portal.calif || null,
    updatedAt: Date.now()
  }).then(()=>{
    toast('Publicado a Firebase ✓','success');
  }).catch(err=>{
    console.error(err);
    toast('Error: '+err.message,'error');
  });
}

// Initialize Firebase on page load
initFirebase();

// ── Utils ─────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function escHtml(s){ return String(s||'').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function toast(msg, type='success'){
  const h = document.getElementById('toastHolder');
  const t = document.createElement('div');
  t.className = 'toast '+type; t.textContent = msg;
  h.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2600);
}
function openModal(html){
  const h = document.getElementById('modalHolder');
  h.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal(){ document.getElementById('modalHolder').innerHTML=''; }

// ── Grado/Grupo parsing from imported Registro groups ─────────
// Registro groups have g.grado ('1','2','3') and g.name like "3°A Matemáticas"
function parseGrupoLetter(name){
  if(!name) return '';
  const m = name.match(/[1-3]°?\s*([A-Fa-f])/);
  return m ? m[1].toUpperCase() : '';
}
function gradoLabel(g){ return g==='1'?'1°':g==='2'?'2°':g==='3'?'3°':'—'; }
function grupoLabel(g){ return g ? g.toUpperCase() : '—'; }

// ── LOGIN ─────────────────────────────────────
function loginTeacher(){
  const u = document.getElementById('tUser').value.trim();
  const p = document.getElementById('tPass').value;
  if(u === TEACHER_USER && p === TEACHER_PASS){
    session = {role:'teacher', label:'Maestro admin'};
    showApp();
  } else {
    document.getElementById('tErr').textContent = 'Usuario o contraseña incorrectos';
  }
}

function _normCode(s){ return String(s||'').trim().toUpperCase().replace(/\s+/g,''); }

function findStudentByCode(code){
  if(!portal.calif || !portal.calif.groups) return null;
  const target = _normCode(code);
  if(!target) return null;
  // Search across all groups; case-insensitive, whitespace-forgiving
  for(const g of portal.calif.groups){
    if(!g.students) continue;
    for(const s of g.students){
      if(s.qrCode && _normCode(s.qrCode) === target){
        return { student:s, group:g };
      }
    }
  }
  return null;
}

function countStudentsWithCode(){
  if(!portal.calif || !portal.calif.groups) return { total:0, withCode:0 };
  const seen = new Set();
  const seenWithCode = new Set();
  portal.calif.groups.forEach(g=>{
    (g.students||[]).forEach(s=>{
      seen.add(s.name);
      if(s.qrCode && s.qrCode.trim()) seenWithCode.add(s.name);
    });
  });
  return { total: seen.size, withCode: seenWithCode.size };
}

function loginStudent(){
  const code = document.getElementById('sCode').value.trim();
  if(!code){ document.getElementById('sErr').textContent = 'Escribe tu código'; return; }
  if(!portal.calif || !portal.calif.groups){
    document.getElementById('sErr').textContent = 'El maestro aún no ha cargado datos';
    return;
  }
  const match = findStudentByCode(code);
  if(!match){
    const st = countStudentsWithCode();
    let msg = `Código "${code}" no encontrado.`;
    if(st.withCode===0) msg += ` Ningún alumno tiene código asignado aún (pídele a tu maestro).`;
    else msg += ` Hay ${st.withCode} de ${st.total} alumnos con código. Revisa mayúsculas y espacios.`;
    document.getElementById('sErr').textContent = msg;
    return;
  }
  session = { role:'student', code, label:match.student.name,
              grado:match.group.grado||'', grupo:parseGrupoLetter(match.group.name), studentId:match.student.id };
  showApp();
}

function loginParent(){
  const code = document.getElementById('pCode').value.trim();
  if(!code){ document.getElementById('pErr').textContent = 'Escribe el código de tu hijo'; return; }
  if(!portal.calif || !portal.calif.groups){
    document.getElementById('pErr').textContent = 'El maestro aún no ha cargado datos';
    return;
  }
  const match = findStudentByCode(code);
  if(!match){
    const st = countStudentsWithCode();
    let msg = `Código "${code}" no encontrado.`;
    if(st.withCode===0) msg += ` Ningún alumno tiene código. Pídele al maestro que asigne uno.`;
    else msg += ` Hay ${st.withCode} de ${st.total} alumnos con código. Revisa mayúsculas y espacios.`;
    document.getElementById('pErr').textContent = msg;
    return;
  }
  session = { role:'parent', code, label:'Padre de '+match.student.name,
              studentName:match.student.name, studentId:match.student.id };
  showApp();
}

function logout(){
  session = null;
  document.body.classList.remove('parent-mode');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('landing').classList.remove('hidden');
  ['tUser','tPass','sCode','pCode'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  ['tErr','sErr','pErr'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent=''; });
}

function showApp(){
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.body.classList.toggle('parent-mode', session.role==='parent');
  document.getElementById('userLabel').textContent = session.label;
  if(session.role==='teacher'){
    document.getElementById('brandIcon').textContent = '👨‍🏫';
    document.getElementById('brandText').textContent = 'Panel del Maestro';
    renderTeacherTabs();
  } else if(session.role==='student'){
    document.getElementById('brandIcon').textContent = '🎒';
    document.getElementById('brandText').textContent = 'Mi aula';
    renderStudentTabs();
  } else {
    document.getElementById('brandIcon').textContent = '👪';
    document.getElementById('brandText').textContent = 'Portal Padres';
    // Append live indicator after username for parent mode
    const ul = document.getElementById('userLabel');
    if(ul && !document.getElementById('liveIndicator')){
      const live = document.createElement('span');
      live.id = 'liveIndicator';
      live.className = 'live-pill';
      live.style.marginLeft = '.6rem';
      live.innerHTML = '<span class="live-dot"></span>EN VIVO';
      live.title = 'Las calificaciones se actualizan automáticamente cuando el maestro las modifica';
      ul.parentNode.insertBefore(live, ul.nextSibling);
    }
    renderParentTabs();
  }
  // Remove live indicator if not parent
  if(session.role !== 'parent'){
    const li = document.getElementById('liveIndicator');
    if(li) li.remove();
  }
}

   TEACHER AREA
═══════════════════════════════════════════ */
let teacherTab = 'calif';

function renderTeacherTabs(){
  const tabs = [
    {id:'calif', label:'📊 Calificaciones'},
    {id:'materials', label:'📁 Materiales'},
    {id:'exams', label:'📝 Exámenes'},
    {id:'visibility', label:'👁️ Visibilidad'},
    {id:'io', label:'💾 Importar / Exportar'}
  ];
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = tabs.map(t=>`<button class="tab ${teacherTab===t.id?'active':''}" onclick="setTeacherTab('${t.id}')">${t.label}</button>`).join('');
  renderTeacherContent();
}
function setTeacherTab(id){ teacherTab=id; renderTeacherTabs(); }

function renderTeacherContent(){
  const c = document.getElementById('content');
  if(teacherTab==='calif') c.innerHTML = viewCalif();
  else if(teacherTab==='materials') c.innerHTML = viewMaterials();
  else if(teacherTab==='exams') c.innerHTML = viewExams();
  else if(teacherTab==='visibility') c.innerHTML = viewVisibility();
  else if(teacherTab==='io') c.innerHTML = viewIO();
}

      ${isLive
        ? `<p class="sub">¡Excelente! Las calificaciones se sincronizan automáticamente entre tu Registro y el Portal. Cuando guardes una calificación en Index.html, los padres la verán en su pantalla en pocos segundos sin necesidad de recargar.</p>`
        : `<p class="sub">Cuando se configura, los padres ven las calificaciones <strong>en vivo</strong> en cuanto guardas en Index.html. Para activarla:</p>

function showCodesList(){
  if(!portal.calif || !portal.calif.groups){ toast('No hay datos importados','error'); return; }
  const map = {};
  portal.calif.groups.forEach(g=>{
    (g.students||[]).forEach(s=>{
      if(!map[s.name]) map[s.name] = { name:s.name, code:s.qrCode||'', groups:new Set() };
      if(s.qrCode && !map[s.name].code) map[s.name].code = s.qrCode;
      map[s.name].groups.add(g.name);
    });
  });
  const list = Object.values(map).sort((a,b)=>a.name.localeCompare(b.name));
  const withCode = list.filter(x=>x.code);
  const withoutCode = list.filter(x=>!x.code);
  const rows = withCode.map(x=>`
    <tr>
      <td>${escHtml(x.name)}</td>
      <td><code style="background:var(--soft);padding:3px 10px;border-radius:6px;font-weight:700;color:var(--accent)">${escHtml(x.code)}</code></td>
      <td style="font-size:.78rem;color:var(--muted)">${[...x.groups].join(', ')}</td>
    </tr>
  `).join('') || `<tr><td colspan="3" style="text-align:center;padding:1rem;color:var(--muted)">Ningún alumno tiene código asignado.</td></tr>`;
  const missing = withoutCode.length
    ? `<div style="margin-top:1rem;padding:1rem;background:#fff7ee;border:1.5px solid #f0c080;border-radius:10px">
       <strong style="color:var(--orange)">⚠️ Alumnos sin código (${withoutCode.length})</strong>
       <p class="sub" style="margin:.4rem 0">Estos no podrán entrar hasta que les asignes código en el Registro y reimportes.</p>
       <div style="display:flex;flex-wrap:wrap;gap:.4rem">${withoutCode.map(x=>`<span class="pill pill-off">${escHtml(x.name)}</span>`).join('')}</div></div>`
    : '';
  window._codesForCopy = withCode;
  openModal(`
    <div class="modal-head">
      <h3>🔑 Códigos de alumnos (${withCode.length}/${list.length})</h3>
      <span class="modal-close" onclick="closeModal()">×</span>
    </div>
    <div class="modal-body">
      <p class="sub" style="margin-bottom:1rem">Tabla de códigos exactos. Al entrar, el código <strong>no es sensible a mayúsculas</strong> ni a espacios al inicio/final — pero sí debe coincidir el contenido.</p>
      <div style="overflow-x:auto"><table class="grades-table" style="min-width:auto">
        <thead><tr><th>Alumno</th><th>Código</th><th>Grupo(s)</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      ${missing}
      <div class="btn-row" style="margin-top:1rem">
        <button class="btn btn-sec" onclick="copyCodesToClipboard()">📋 Copiar tabla al portapapeles</button>
      </div>
    </div>
  `);
}

function copyCodesToClipboard(){
  const list = window._codesForCopy || [];
  const text = 'Alumno\tCódigo\n' + list.map(x=>`${x.name}\t${x.code}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>toast('Copiado al portapapeles','success')).catch(()=>{
    const ta = document.createElement('textarea'); ta.value = text;
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast('Copiado','success'); }catch(e){}
    document.body.removeChild(ta);
  });
}

function renderCalifGroupList(){

function importCalif(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try{
      const data = JSON.parse(ev.target.result);
      let groups = null;
      if(Array.isArray(data.groups)) groups = data.groups;
      else if(data.regCalif_v3 && Array.isArray(data.regCalif_v3.groups)) groups = data.regCalif_v3.groups;
      if(!groups){ toast('El archivo no contiene grupos reconocibles','error'); return; }
      portal.calif = { groups, importedAt: new Date().toISOString() };
      saveStore();
      syncToFirebase(true); // IMMEDIATE, don't wait for debounce
      renderTeacherContent();
      const st = countStudentsWithCode();
      toast(`Importados ${groups.length} grupos · ${st.withCode}/${st.total} alumnos con código ✓`,'success');
    }catch(err){ toast('Archivo JSON inválido','error'); }
  };
  r.readAsText(f);
  e.target.value = '';
}
function syncFromBrowser(){
  try{
    const raw = localStorage.getItem('regCalif_v3');
    if(!raw){ toast('No se encontraron datos del Registro en este navegador. Abre Index.html en esta misma pestaña/origen, o usa Importar JSON.','error'); return; }
    const data = JSON.parse(raw);
    if(!data.groups || !Array.isArray(data.groups)){ toast('Los datos del navegador no son válidos','error'); return; }
    portal.calif = { groups: data.groups, importedAt: new Date().toISOString() };
    saveStore();
    syncToFirebase(true); // IMMEDIATE
    renderTeacherContent();
    const st = countStudentsWithCode();
    toast(`Sincronizado: ${data.groups.length} grupos · ${st.withCode}/${st.total} con código ✓`,'success');
  }catch(err){ toast('Error al leer datos del navegador','error'); }
}
function clearCalif(){
  if(!confirm('¿Borrar los datos de calificaciones importados?')) return;
  portal.calif = null; saveStore(); renderTeacherContent();
  toast('Datos borrados','success');
}

function matTypeFields(type){

function matTypeChanged(){

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = ()=>rej(r.error);
    r.readAsDataURL(file);
  });
}
function fileToText(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = ()=>rej(r.error);
    r.readAsText(file);
  });
}
async function saveMaterial(){
  const type = document.getElementById('mType').value;
  const title = document.getElementById('mTitle').value.trim();
  const desc = document.getElementById('mDesc').value.trim();
  const grado = document.getElementById('mGrado').value;
  const grupo = document.getElementById('mGrupo').value;
  if(!title){ toast('Ingresa un título','error'); return; }
  let content = null, filename = '';
  try{
    if(type==='link'){
      const url = document.getElementById('mUrl').value.trim();
      if(!url){ toast('Ingresa la URL','error'); return; }
      content = url;
    } else if(type==='doc' || type==='image'){
      const file = document.getElementById('mFile').files[0];
      if(!file){ toast('Selecciona un archivo','error'); return; }
      if(file.size > 8*1024*1024){ toast('Archivo muy grande (máx 8 MB)','error'); return; }
      content = await fileToBase64(file);
      filename = file.name;
    } else if(type==='game'){
      const file = document.getElementById('mFile').files[0];
      const code = document.getElementById('mHtmlCode').value.trim();
      if(file){
        if(file.size > 4*1024*1024){ toast('HTML muy grande (máx 4 MB)','error'); return; }
        content = await fileToText(file);
        filename = file.name;
      } else if(code){
        content = code;
      } else { toast('Carga un archivo HTML o pega el código','error'); return; }
    }
  }catch(err){ toast('Error al leer el archivo','error'); return; }
  portal.materials.push({
    id: uid(), type, title, desc, grado, grupo, content, filename,
    createdAt: new Date().toISOString(), visible: true
  });
  saveStore(); renderTeacherContent();
  toast('Material guardado ✓','success');
}

function renderQuestionsDraft(){
  if(!examDraft.questions.length) return `<p style="color:var(--muted);text-align:center;padding:1rem">Añade preguntas para empezar</p>`;
  return examDraft.questions.map((q,i)=>`

      </div>
      <div class="form-group" style="margin-bottom:.7rem">
        <input type="text" value="${escHtml(q.q)}" oninput="examDraft.questions[${i}].q=this.value" placeholder="Texto de la pregunta">
      </div>
      ${q.opts.map((o,j)=>`
        <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.4rem">
          <input type="radio" name="correct_${i}" ${q.correct===j?'checked':''} onchange="examDraft.questions[${i}].correct=${j}" title="Marcar como correcta">
          <input type="text" style="flex:1;padding:8px 12px;border:1.5px solid var(--line);border-radius:7px;background:#fff" value="${escHtml(o)}" oninput="examDraft.questions[${i}].opts[${j}]=this.value" placeholder="Opción ${j+1}">

        </div>
      `).join('')}
      <button class="btn btn-sec btn-small" style="margin-top:.4rem" onclick="addOpt(${i})">➕ Opción</button>
    </div>
  `).join('');
}
function addQuestion(){
  examDraft.questions.push({q:'',opts:['',''],correct:0});
  document.getElementById('questionsList').innerHTML = renderQuestionsDraft();
}
function delQuestion(i){
  examDraft.questions.splice(i,1);
  document.getElementById('questionsList').innerHTML = renderQuestionsDraft();
}
function addOpt(i){
  examDraft.questions[i].opts.push('');
  document.getElementById('questionsList').innerHTML = renderQuestionsDraft();
}
function delOpt(i,j){
  const q = examDraft.questions[i];
  q.opts.splice(j,1);
  if(q.correct>=q.opts.length) q.correct = 0;
  document.getElementById('questionsList').innerHTML = renderQuestionsDraft();
}
function saveExam(){
  if(!examDraft.title.trim()){ toast('Ingresa un título','error'); return; }
  if(!examDraft.questions.length){ toast('Agrega al menos una pregunta','error'); return; }
  for(const q of examDraft.questions){
    if(!q.q.trim()){ toast('Hay una pregunta vacía','error'); return; }
    if(q.opts.some(o=>!o.trim())){ toast('Hay opciones vacías','error'); return; }
  }
  if(examDraft._editingId){
    // Replace existing exam
    const idx = portal.exams.findIndex(e=>e.id===examDraft._editingId);
    if(idx>=0){
      const old = portal.exams[idx];
      portal.exams[idx] = {
        ...old,
        title:examDraft.title.trim(), desc:examDraft.desc.trim(),
        grado:examDraft.grado, grupo:examDraft.grupo,
        questions: JSON.parse(JSON.stringify(examDraft.questions)),
        updatedAt: new Date().toISOString()
      };
      saveStore(); resetExamDraft(); renderTeacherContent();
      toast('Examen actualizado ✓','success');
      return;
    }
  }
  portal.exams.push({
    id: uid(), title:examDraft.title.trim(), desc:examDraft.desc.trim(),
    grado:examDraft.grado, grupo:examDraft.grupo,
    questions: JSON.parse(JSON.stringify(examDraft.questions)),
    createdAt: new Date().toISOString(), visible: true
  });
  saveStore();
  resetExamDraft();
  renderTeacherContent();
  toast('Examen guardado ✓','success');
}

let _mammothLoaded = false;
function _loadMammoth(){
  return new Promise((resolve, reject)=>{
    if(_mammothLoaded && window.mammoth){ resolve(); return; }
    const cdns = [
      'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.7.2/mammoth.browser.min.js',
      'https://unpkg.com/mammoth@1.7.2/mammoth.browser.min.js',
      'https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js'
    ];
    let i=0;
    const tryNext = ()=>{
      if(i>=cdns.length){ reject(new Error('No se pudo cargar mammoth.js')); return; }
      const s = document.createElement('script');
      s.src = cdns[i++];
      s.onload = ()=>{ _mammothLoaded=true; resolve(); };
      s.onerror = tryNext;
      document.head.appendChild(s);
    };
    tryNext();
  });
}

// Parse plain text into questions/options
function parseExamText(text){
  // Normalize line breaks and split
  const lines = text.replace(/\r\n/g,'\n').replace(/\xa0/g,' ').split('\n')
    .map(l=>l.trim()).filter(l=>l.length>0);
  const questions = [];
  let current = null;
  // Regexes
  const reQ = /^\*?(\d+)[\.\)]\s*(.+)$/;            // "1. text" or "*1. text"
  const reOpt = /^(\*?)\s*([a-zA-Z])[\)\.]\s*(.+)$/; // "a) text", "*a) text", "A. text"
  const reCorrectMark = /\s*(?:\[\s*[xX✓✔]\s*\]|\(correcta?\)|\*\s*$)/i;

  for(const line of lines){
    let m = line.match(reQ);
    if(m && !line.match(/^[a-dA-D][\)\.]/)){ // make sure it's not an option that starts with digit
      // Push previous
      if(current && current.opts.length>=2) questions.push(current);
      current = { q: m[2].trim().replace(/[:：]\s*$/,''), opts: [], correct: 0, _hasMark: false };
      continue;
    }
    m = line.match(reOpt);
    if(m && current){
      const isCorrectByPrefix = m[1] === '*';
      let optText = m[3].trim();
      let isCorrectBySuffix = false;
      const sm = optText.match(reCorrectMark);
      if(sm){ isCorrectBySuffix = true; optText = optText.replace(reCorrectMark,'').trim(); }
      current.opts.push(optText);
      if(isCorrectByPrefix || isCorrectBySuffix){
        current.correct = current.opts.length - 1;
        current._hasMark = true;
      }
      continue;
    }
    // Continuation of question text (no leading number)?
    if(current && current.opts.length===0 && line.length>2){
      current.q += ' ' + line;
    }
  }
  if(current && current.opts.length>=2) questions.push(current);

  // Stats
  const unmarked = questions.filter(q=>!q._hasMark).length;
  questions.forEach(q=>{ delete q._hasMark; });
  return { questions, unmarked };
}

function importExamWord(event){
  const file = event.target.files[0];
  if(!file) return;
  toast('Procesando archivo Word…','success');
  _loadMammoth().then(()=>{
    const reader = new FileReader();
    reader.onload = ev => {
      window.mammoth.extractRawText({ arrayBuffer: ev.target.result })
        .then(result => {
          const text = result.value || '';
          const parsed = parseExamText(text);
          if(!parsed.questions.length){
            toast('No se encontraron preguntas en el archivo. Revisa el formato.','error');
            return;
          }
          // Try to extract a title from the first lines
          const firstLines = text.split('\n').map(l=>l.trim()).filter(l=>l.length>0).slice(0,5);
          let title = '';
          for(const l of firstLines){
            if(!l.match(/^\d+[\.\)]/) && !l.match(/^[a-dA-D][\)\.]/) && l.length<120){
              title = l; break;
            }
          }
          // Populate draft (preserve existing fields if user already set them)
          if(!examDraft.title) examDraft.title = title || file.name.replace(/\.docx?$/i,'');
          examDraft.questions = parsed.questions;
          renderTeacherContent();
          let msg = `✓ ${parsed.questions.length} preguntas importadas`;
          if(parsed.unmarked > 0){
            msg += ` · ⚠️ ${parsed.unmarked} sin respuesta marcada (revísalas y marca la correcta antes de guardar)`;
          }
          toast(msg, parsed.unmarked>0?'error':'success');
        })
        .catch(err => { console.error(err); toast('Error al leer el .docx: '+err.message,'error'); });
    };
    reader.readAsArrayBuffer(file);
  }).catch(err => {
    toast('No se pudo cargar el lector de Word: '+err.message,'error');
  });
  event.target.value = '';
}

function exportExamWord(id){
  const e = portal.exams.find(x=>x.id===id);
  if(!e) return;
  const today = new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
  const grado = e.grado==='all' ? 'Todos los grados' : gradoLabel(e.grado);
  const grupo = e.grupo==='all' ? 'Todos los grupos' : 'Grupo '+e.grupo;

  // Build the question/options HTML
  // The correct answer is marked with * before the letter
  const letters = ['a','b','c','d','e','f','g','h'];
  const questionsHtml = e.questions.map((q, i) => {
    const opts = q.opts.map((o, j) => {
      const isCorrect = j === q.correct;
      const letter = letters[j] || String.fromCharCode(97+j);
      const prefix = isCorrect ? '*' : '';
      return `<p style="margin:0 0 4pt 18pt">${prefix}${letter}) ${escHtml(o)}</p>`;
    }).join('');
    return `<p style="margin:14pt 0 6pt 0;font-weight:bold">${i+1}. ${escHtml(q.q)}</p>${opts}`;
  }).join('');

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="UTF-8">
<title>${escHtml(e.title)}</title>
<!--[if gte mso 9]><xml>
<w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument>
</xml><![endif]-->
<style>
@page { size: letter; margin: 2cm; }
body { font-family: 'Calibri', Arial, sans-serif; font-size: 12pt; color: #000; line-height: 1.4; }
h1 { font-size: 16pt; text-align: center; margin: 0 0 12pt 0; }
.header-info { margin: 8pt 0; font-size: 11pt; }
.instructions { margin: 12pt 0; font-style: italic; }
.legend { font-size: 9pt; color: #666; border-top: 1px solid #ccc; padding-top: 6pt; margin-top: 24pt; }
</style>
</head>
<body>
<h1><b>${escHtml(e.title)}</b></h1>
${e.desc ? `<p style="text-align:center;font-size:11pt;color:#444;margin:0 0 14pt 0">${escHtml(e.desc)}</p>` : ''}
<p class="header-info"><b>Nombre del Alumno/a:</b> _________________________________________________</p>
<p class="header-info"><b>Fecha:</b> ____________________ &nbsp;&nbsp; <b>${escHtml(grado)}</b> &nbsp;&nbsp; <b>${escHtml(grupo)}</b> &nbsp;&nbsp; <b>Aciertos:</b> _______ / ${e.questions.length}</p>
<p class="instructions"><b>Instrucciones:</b> Lee cuidadosamente cada pregunta y selecciona la opción que consideres correcta. Solo una respuesta es válida por pregunta.</p>
${questionsHtml}
<p class="legend">📝 Generado el ${today} desde Portal Escolar. La respuesta correcta está marcada con un asterisco (*) antes de la letra. Borra los asteriscos antes de imprimir si no quieres que los alumnos los vean.</p>
</body>
</html>`;

  const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = e.title.replace(/[^a-zA-Z0-9_\-]+/g,'_') + '.doc';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Examen exportado a Word ✓','success');
}

function matchesStudent(item){
  if(!item.visible) return false;
  const gradoOk = item.grado==='all' || item.grado===session.grado;
  const grupoOk = item.grupo==='all' || item.grupo===session.grupo;
  return gradoOk && grupoOk;
}

function renderStudentContent(){
  const c = document.getElementById('content');
  if(studentTab==='materials'){
    const mine = portal.materials.filter(matchesStudent);
    // Group by type
    const groups = { link:[], doc:[], image:[], game:[] };
    mine.forEach(m=>{ if(groups[m.type]) groups[m.type].push(m); });
    const labels = { link:'🔗 Enlaces web', doc:'📄 Documentos', image:'🖼️ Imágenes', game:'🎮 Juegos' };
    let html = `<div class="panel"><h3>Hola, ${escHtml(session.label)} 👋</h3><p class="sub">Grado: ${gradoLabel(session.grado)} · Grupo: ${grupoLabel(session.grupo)}</p></div>`;
    const anyShown = Object.values(groups).some(arr=>arr.length);
    if(!anyShown){
      html += `<div class="empty"><div class="big">📭</div><p>Tu maestro aún no ha publicado materiales para tu grupo.</p></div>`;
    } else {
      for(const key of ['link','doc','image','game']){
        const arr = groups[key];
        if(!arr.length) continue;
        html += `<div class="panel"><h3>${labels[key]}</h3><div class="mat-grid">${
          arr.map(m=>`<div class="mat-card" onclick="openMaterial('${m.id}')">
            <div class="m-icon">${key==='link'?'🔗':key==='doc'?'📄':key==='image'?'🖼️':'🎮'}</div>
            <h4>${escHtml(m.title)}</h4>
            <div class="m-desc">${escHtml(m.desc||'')}</div>
            <span class="m-type">Abrir</span>
          </div>`).join('')
        }</div></div>`;
      }
    }
    c.innerHTML = html;
  } else if(studentTab==='exams'){
    const mine = portal.exams.filter(matchesStudent);
    if(!mine.length){
      c.innerHTML = `<div class="empty"><div class="big">📝</div><p>No hay exámenes disponibles por ahora.</p></div>`;
      return;
    }
    c.innerHTML = `<div class="panel"><h3>Exámenes disponibles</h3><div class="mat-grid">${
      mine.map(e=>{
        const done = portal.examResults.find(r=>r.examId===e.id && r.studentCode===session.code);
        return `<div class="mat-card" onclick="${done?`showExamDone('${e.id}')`:`startExam('${e.id}')`}">

          <h4>${escHtml(e.title)}</h4>
          <div class="m-desc">${escHtml(e.desc||'')}</div>

        </div>`;
      }).join('')
    }</div></div>`;
  }
}

function gmToggleMax(){

  if(!m) return;
  m.classList.toggle('maximized');

    m.style.width=''; m.style.height=''; m.style.top=''; m.style.left=''; m.style.transform='';
  }
}
function _gmSetup(){
  const modal = document.getElementById('gameModal');
  const head = document.getElementById('gmHead');
  if(!modal || !head) return;
  let dragging=false, dx=0, dy=0, startL=0, startT=0;
  head.addEventListener('mousedown', e=>{
    if(e.target.closest('.gm-btn')) return;
    if(modal.classList.contains('maximized')) return;
    dragging=true;
    const r = modal.getBoundingClientRect();
    startL = r.left; startT = r.top; dx = e.clientX; dy = e.clientY;
    modal.style.margin='0'; modal.style.position='fixed';
    modal.style.left = startL+'px'; modal.style.top = startT+'px';
    modal.style.transform='none';
    document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove', e=>{
    if(!dragging) return;
    modal.style.left = (startL + e.clientX - dx)+'px';
    modal.style.top = (startT + e.clientY - dy)+'px';
  });
  document.addEventListener('mouseup', ()=>{ dragging=false; document.body.style.userSelect=''; });
  modal.querySelectorAll('.gm-resize').forEach(handle=>{
    handle.addEventListener('mousedown', e=>{
      if(modal.classList.contains('maximized')) return;
      e.preventDefault(); e.stopPropagation();
      const dir = handle.dataset.dir;
      const r = modal.getBoundingClientRect();
      const sx=e.clientX, sy=e.clientY, sw=r.width, sh=r.height, sl=r.left, st=r.top;
      modal.style.margin='0'; modal.style.position='fixed'; modal.style.transform='none';
      modal.style.left=sl+'px'; modal.style.top=st+'px';
      document.body.style.userSelect='none';
      function onMove(ev){
        const dx=ev.clientX-sx, dy=ev.clientY-sy;
        let nw=sw, nh=sh, nl=sl, nt=st;
        if(dir.includes('e')) nw = Math.max(320, sw+dx);
        if(dir.includes('s')) nh = Math.max(300, sh+dy);
        if(dir.includes('w')){ nw = Math.max(320, sw-dx); nl = sl+(sw-nw); }
        if(dir.includes('n')){ nh = Math.max(300, sh-dy); nt = st+(sh-nh); }
        modal.style.width=nw+'px'; modal.style.height=nh+'px';
        modal.style.left=nl+'px'; modal.style.top=nt+'px';
      }
      function onUp(){ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); document.body.style.userSelect=''; }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// ── EXAM taking ──
let currentExam = null;
let examAnswers = [];

function startExam(id){
  const e = portal.exams.find(x=>x.id===id);
  if(!e) return;
  currentExam = e;
  examAnswers = new Array(e.questions.length).fill(-1);
  renderExamTake();
}
function renderExamTake(){
  const c = document.getElementById('content');
  const e = currentExam;
  c.innerHTML = `
    <div class="panel">
      <h3>📝 ${escHtml(e.title)}</h3>
      ${e.desc?`<p class="sub">${escHtml(e.desc)}</p>`:''}
      <div id="qWrap">${e.questions.map((q,i)=>`
        <div class="exam-q">
          <h4>${i+1}. ${escHtml(q.q)}</h4>
          <div class="exam-opts">${q.opts.map((o,j)=>`
            <label class="exam-opt ${examAnswers[i]===j?'selected':''}">
              <input type="radio" name="q${i}" ${examAnswers[i]===j?'checked':''} onchange="examAnswers[${i}]=${j};document.querySelectorAll('.exam-opts input[name=q${i}]').forEach((el,k)=>el.closest('.exam-opt').classList.toggle('selected',k===${j}))">
              <span>${escHtml(o)}</span>
            </label>
          `).join('')}</div>
        </div>
      `).join('')}</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="submitExam()">✓ Enviar respuestas</button>
        <button class="btn btn-sec" onclick="cancelExam()">Cancelar</button>
      </div>
    </div>
  `;
}
function cancelExam(){ currentExam=null; examAnswers=[]; renderStudentContent(); }
function submitExam(){
  if(examAnswers.some(a=>a<0)){ if(!confirm('Hay preguntas sin contestar. ¿Enviar de todas formas?')) return; }
  let score = 0;
  currentExam.questions.forEach((q,i)=>{ if(examAnswers[i]===q.correct) score++; });
  const result = {
    examId: currentExam.id, studentCode: session.code, studentName: session.label,
    score, total: currentExam.questions.length, date: new Date().toISOString()
  };
  portal.examResults.push(result);
  localStorage.setItem(STORE_KEY, JSON.stringify(portal));
  pushExamResult(result);
  const calif = ((score/currentExam.questions.length)*10).toFixed(1);
  toast(`Calificación: ${calif} (${score}/${currentExam.questions.length})`,'success');
  currentExam = null; examAnswers = [];
  renderStudentContent();
}
function showExamDone(id){
  const e = portal.exams.find(x=>x.id===id);
  const r = portal.examResults.find(x=>x.examId===id && x.studentCode===session.code);
  openModal(`
    <div class="modal-head"><h3>${escHtml(e.title)}</h3><span class="modal-close" onclick="closeModal()">×</span></div>
    <div class="modal-body" style="text-align:center">
      <div style="font-size:3.5rem;margin-bottom:.5rem">🎉</div>
      <p style="font-size:1rem;margin-bottom:1rem">Ya contestaste este examen</p>
      <div style="font-size:3rem;font-weight:700;color:var(--green)">${((r.score/r.total)*10).toFixed(1)}</div>
      <p style="color:var(--muted)">${r.score} de ${r.total} aciertos</p>
      <p style="color:var(--muted);font-size:.82rem;margin-top:.5rem">${new Date(r.date).toLocaleString('es-MX')}</p>
    </div>
  `);
}

let parentTab = 'grades';

function renderParentTabs(){
  const groups = getStudentGroups();
  let hasBuena=false, hasMala=false;
  groups.forEach(g=>{
    const s=getStudentInGroup(g); if(!s) return;
    const c=(g.conduct||{})[s.id]; if(!c) return;
    const lev=c.level||0;
    if(lev===1) hasBuena=true;
    else if(lev>=3) hasMala=true;
  });
  let badge='';
  if(hasMala) badge=' <span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#ef4444;box-shadow:0 0 8px #ef4444;animation:livePulse 2s ease-in-out infinite;vertical-align:middle;margin-left:.3rem"></span>';
  else if(hasBuena) badge=' <span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#10b981;box-shadow:0 0 8px #10b981;animation:livePulse 2s ease-in-out infinite;vertical-align:middle;margin-left:.3rem"></span>';
  const tabs=[
    {id:'grades',label:'📊 Calificaciones'},
    {id:'tasks',label:'📋 Tareas'},
    {id:'conduct',label:'⚠️ Conducta'+badge},
    {id:'summary',label:'🏆 Resumen final'}
  ];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${parentTab===t.id?'active':''}" onclick="setParentTab('${t.id}')">${t.label}</button>`).join('');
}
function setParentTab(id){ parentTab=id; renderParentTabs(); renderParentContent(); }
function changeTrimSel(val){ if(!session) return; session._trimSel=val; renderParentContent(); }

function getStudentGroups(){
  if(!portal.calif||!portal.calif.groups) return [];
  const code=session.code;
  return portal.calif.groups.filter(g=>(g.students||[]).some(s=>s.qrCode&&_normCode(s.qrCode)===_normCode(code)));
}
function getStudentInGroup(g){
  return (g.students||[]).find(s=>s.qrCode&&_normCode(s.qrCode)===_normCode(session.code));
}
function calcAvgForStudent(g,sid){
  if(!g.activities||!g.grades) return null;
  let sum=0,cnt=0;
  g.activities.forEach(a=>{
    const v=g.grades[sid+'_'+a.id];
    if(v!==undefined&&v!==null&&v!==''){
      let n=NaN;
      if(typeof v==='string'&&v.startsWith('T:')) n=parseFloat(v.slice(2));
      else if(typeof v==='string'&&v.startsWith('IN:')) n=parseFloat(v.slice(3));
      else if(v==='NE') n=0;
      else n=parseFloat(v);
      if(!isNaN(n)){ sum+=n; cnt++; }
    }
  });
  return cnt>0?(sum/cnt):null;
}

function renderParentContent(){
  const c=document.getElementById('content');
  const groups=getStudentGroups();
  if(!groups.length){ c.innerHTML='<div class="empty"><div class="big">📭</div><p>No hay información registrada para este código.</p></div>'; return; }
  if(parentTab==='grades') c.innerHTML=renderParentGrades(groups);
  else if(parentTab==='tasks') c.innerHTML=renderParentTasks(groups);
  else if(parentTab==='conduct') c.innerHTML=renderParentConduct(groups);
  else if(parentTab==='summary') c.innerHTML=renderParentSummary(groups);
}

function _chipCalif(v){
  if(v===undefined||v===null||v==='') return '<span style="color:#bbb">—</span>';
  if(v==='NE') return '<span style="background:#fee2e2;color:#991b1b;padding:3px 11px;border-radius:100px;font-weight:800;font-size:.78rem;border:1.5px solid #ef4444">❌ NE</span>';
  if(typeof v==='string'&&v.startsWith('T:')){ const n=v.slice(2); return '<span style="background:#fef3c7;color:#92400e;padding:3px 11px;border-radius:100px;font-weight:800;font-size:.78rem;border:1.5px solid #f59e0b">⏰'+(n?' '+n:'')+'</span>'; }
  if(typeof v==='string'&&v.startsWith('IN:')){ const n=v.slice(3); return '<span style="background:#ede9fe;color:#5b21b6;padding:3px 11px;border-radius:100px;font-weight:700;font-size:.78rem;border:1.5px solid #8b5cf6">🏥'+(n?' '+n:'')+'</span>'; }
  const num=parseFloat(v);
  if(!isNaN(num)){
    if(num>=9) return '<span style="background:#d1fae5;color:#065f46;padding:3px 12px;border-radius:100px;font-weight:800;font-size:.85rem;border:1.5px solid #10b981">✨ '+v+'</span>';
    if(num>=6) return '<span style="background:#dbeafe;color:#1e40af;padding:3px 11px;border-radius:100px;font-weight:700;font-size:.8rem;border:1.5px solid #3b82f6">'+v+'</span>';
    return '<span style="background:#fee2e2;color:#991b1b;padding:3px 11px;border-radius:100px;font-weight:800;font-size:.8rem;border:1.5px solid #ef4444">'+v+'</span>';
  }
  return '<span style="font-weight:600">'+escHtml(String(v))+'</span>';
}

function renderParentGrades(groups){
  const porTrim={'1':[],'2':[],'3':[],'x':[]};
  groups.forEach(g=>{ const t=g.trimestre||'x'; (porTrim[t]||porTrim['x']).push(g); });
  if(!session._trimSel){
    if(porTrim['1'].length) session._trimSel='1';
    else if(porTrim['2'].length) session._trimSel='2';
    else if(porTrim['3'].length) session._trimSel='3';
    else session._trimSel='todos';
  }
  const sel=session._trimSel;
  const labels={'1':'1° Trimestre','2':'2° Trimestre','3':'3° Trimestre','todos':'Todos los trimestres'};
  const selectorHtml=`<div class="panel" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
    <h3 style="margin:0;flex:1;min-width:200px">📊 Calificaciones de ${escHtml(session.studentName)}</h3>
    <div style="display:flex;align-items:center;gap:.6rem">
      <label style="font-size:.78rem;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em">Filtrar:</label>
      <select onchange="changeTrimSel(this.value)" style="padding:9px 14px;border:2px solid var(--accent2);border-radius:9px;background:#fff;font-family:inherit;font-size:.9rem;font-weight:600;color:var(--ink);cursor:pointer;outline:none">
        ${porTrim['1'].length?`<option value="1" ${sel==='1'?'selected':''}>📘 1° Trimestre</option>`:''}
        ${porTrim['2'].length?`<option value="2" ${sel==='2'?'selected':''}>📗 2° Trimestre</option>`:''}
        ${porTrim['3'].length?`<option value="3" ${sel==='3'?'selected':''}>📙 3° Trimestre</option>`:''}
        <option value="todos" ${sel==='todos'?'selected':''}>📚 Ver todos</option>
      </select>
    </div>
  </div>`;
  let gruposMostrar=sel==='todos'?groups:(porTrim[sel]||[]);
  if(!gruposMostrar.length) return selectorHtml+`<div class="empty"><div class="big">📭</div><p>No hay calificaciones en ${labels[sel]||'este filtro'}.</p></div>`;
  let html=selectorHtml;
  gruposMostrar.forEach(g=>{
    const s=getStudentInGroup(g); if(!s) return;
    const avg=calcAvgForStudent(g,s.id);
    const avgStr=avg!==null?avg.toFixed(1):'—';
    const grado=gradoLabel(g.grado),grupo=grupoLabel(parseGrupoLetter(g.name));
    const trimNum=g.trimestre||'x';
    let avgStyle='background:#f3f4f6;color:#6b7280';
    if(avg!==null){
      if(avg>=9) avgStyle='background:linear-gradient(135deg,#10b981,#047857);color:#fff;box-shadow:0 2px 10px rgba(16,185,129,.4)';
      else if(avg>=6) avgStyle='background:linear-gradient(135deg,#3b82f6,#1e40af);color:#fff;box-shadow:0 2px 10px rgba(59,130,246,.4)';
      else avgStyle='background:linear-gradient(135deg,#ef4444,#991b1b);color:#fff;box-shadow:0 2px 10px rgba(239,68,68,.4)';
    }
    html+=`<div class="panel">
      <h3>📚 ${escHtml(g.name)} <span class="subj-chip">${grado} ${grupo}</span> <span class="trim-chip t${trimNum}">Trim. ${g.trimestre||'—'}</span></h3>
      <div class="grades-wrap"><table class="grades-table">
        <thead><tr><th style="width:40px">#</th><th>Alumno</th>${(g.activities||[]).map(a=>`<th class="num">${escHtml(a.name)}</th>`).join('')}<th class="final">Final</th></tr></thead>
        <tbody><tr><td class="num">1</td><td><strong>${escHtml(s.name)}</strong></td>
        ${(g.activities||[]).map(a=>`<td class="num">${_chipCalif((g.grades||{})[s.id+'_'+a.id])}</td>`).join('')}
        <td class="final"><span style="display:inline-block;padding:5px 16px;border-radius:100px;font-weight:800;font-size:1rem;${avgStyle}">${avgStr}</span></td>
        </tr></tbody></table></div></div>`;
  });
  html+=`<div class="panel" style="background:linear-gradient(135deg,#f8fafc,#f1f5f9)">
    <h3 style="font-size:.85rem">🎨 Leyenda de colores</h3>
    <div style="display:flex;gap:.8rem;flex-wrap:wrap;font-size:.78rem;color:var(--ink2)">
      <span>${_chipCalif('10')} Excelente (9-10)</span>
      <span>${_chipCalif('7')} Aprobado (6-8)</span>
      <span>${_chipCalif('5')} Reprobado (&lt;6)</span>
      <span>${_chipCalif('T:')} Retardo</span>
      <span>${_chipCalif('NE')} No entregó</span>
    </div></div>`;
  return html;
}

function renderParentTasks(groups){
  function fechaDe(a){
    if(a.createdAt){ try{ const d=new Date(a.createdAt); if(!isNaN(d.getTime())) return d; }catch(e){} }
    if(a.id&&typeof a.id==='string'){ const ms=parseInt(a.id.split(/[^a-z0-9]/i)[0],36); if(!isNaN(ms)&&ms>1000000000000) return new Date(ms); }
    return null;
  }
  function fmt(d,exact){ if(!d) return '—'; const f=d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); const h=d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}); return exact?`${f} · ${h}`:`${f} · ~${h}`; }
  let entregado=0,tarde=0,pendiente=0,total=0;
  const filas=[];
  groups.forEach(g=>{
    const s=getStudentInGroup(g); if(!s) return;
    const trimNum=g.trimestre||'x';
    (g.activities||[]).forEach(a=>{
      const key=s.id+'_'+a.id;
      const grade=(g.grades||{})[key];
      const hw=(g.hwStatus||{})[key]||{};
      let est=hw.status||'';
      if(!est){
        if(grade==='NE') est='pendiente';
        else if(typeof grade==='string'&&grade.startsWith('T:')) est='tarde';
        else if(grade!==undefined&&grade!==null&&grade!==''&&!(typeof grade==='string'&&grade.startsWith('IN:'))) est='entregado';
      }
      total++;
      if(est==='entregado') entregado++;
      else if(est==='tarde') tarde++;
      else if(est==='pendiente') pendiente++;
      const fecha=fechaDe(a);
      filas.push({nombre:a.name,materia:g.name,trimNum,trim:g.trimestre||'—',fechaStr:fmt(fecha,!!a.createdAt),grade,est,note:hw.note||'',ts:fecha?fecha.getTime():0});
    });
  });
  filas.sort((a,b)=>b.ts-a.ts);
  const stats=`<div class="stats-grid">
    <div class="stat"><div class="label">📚 Total</div><div class="value">${total}</div></div>
    <div class="stat green"><div class="label">✅ Entregadas</div><div class="value">${entregado}</div></div>
    <div class="stat orange"><div class="label">⏰ Con retardo</div><div class="value">${tarde}</div></div>
    <div class="stat red"><div class="label">❌ No entregadas</div><div class="value">${pendiente}</div></div>
  </div>`;
  if(!filas.length) return `<div class="panel"><h3>📋 Reporte detallado</h3><p class="sub">Sin actividades para ${escHtml(session.studentName)}.</p></div>${stats}`;
  const filasHtml=filas.map(f=>{
    const stTxt=f.est==='entregado'?'<span style="color:#10b981;font-weight:700">✅ Entregada</span>':f.est==='tarde'?'<span style="color:#f59e0b;font-weight:700">⏰ Con retardo</span>':f.est==='pendiente'?'<span style="color:#ef4444;font-weight:700">❌ No entregada</span>':'<span style="color:#bbb">—</span>';
    return `<tr><td style="white-space:nowrap;font-size:.78rem;color:var(--ink2);font-weight:600">📅 ${escHtml(f.fechaStr)}</td><td><strong>${escHtml(f.nombre)}</strong>${f.note?`<div style="font-size:.74rem;color:var(--muted);margin-top:.2rem;font-style:italic">📝 ${escHtml(f.note)}</div>`:''}</td><td><span class="subj-chip">${escHtml(f.materia)}</span> <span class="trim-chip t${f.trimNum}">T${f.trim}</span></td><td style="text-align:center">${_chipCalif(f.grade)}</td><td style="text-align:center;font-size:.82rem">${stTxt}</td></tr>`;
  }).join('');
  return `<div class="panel"><h3>📋 Reporte detallado de tareas y actividades</h3><p class="sub">Cada actividad de ${escHtml(session.studentName)} con día, hora, calificación y estado · más recientes primero</p></div>${stats}<div class="panel"><div class="grades-wrap"><table class="grades-table"><thead><tr><th style="min-width:130px">📅 Fecha y hora</th><th>📚 Actividad</th><th>Materia</th><th style="text-align:center;min-width:90px">Calif.</th><th style="text-align:center;min-width:140px">Estado</th></tr></thead><tbody>${filasHtml}</tbody></table></div><p class="sub" style="margin-top:.8rem;font-size:.75rem">💡 Las fechas con <strong>~</strong> son aproximadas (actividades creadas antes de esta función). Las nuevas mostrarán fecha y hora exactas.</p></div>`;
}

function renderParentConduct(groups){
  const clabels=['','⭐ Excelente','⚠️ Regular','🔶 Mala conducta','🔴 Muy grave'];
  const cstyles=['','#2a7a4b','#d68a2a','#c94444','#8b0000'];
  let html='<div class="panel"><h3>⚠️ Reporte de conducta</h3><p class="sub">Registros del maestro</p></div>';
  let any=false;
  groups.forEach(g=>{
    const s=getStudentInGroup(g); if(!s) return;
    const c=(g.conduct||{})[s.id]; if(!c) return;
    const lev=c.level||0; if(lev<1) return;
    any=true;
    const trimNum=g.trimestre||'x';
    let incList=[];
    if(Array.isArray(c.incidents)) incList=c.incidents;
    else if(c.incidents&&typeof c.incidents==='object') incList=Object.values(c.incidents);
    const incHtml=incList.filter(i=>i&&(i.text||i.date)).map(i=>`<div class="item"><div class="i-icon">📌</div><div class="i-body"><div class="i-title">${escHtml(i.text||'(sin descripción)')}</div><div class="i-meta"><span>📅 ${escHtml(i.date||'—')}</span></div></div></div>`).join('');
    html+=`<div class="panel"><h3>📚 ${escHtml(g.name)} <span class="trim-chip t${trimNum}">Trim. ${g.trimestre||'—'}</span> <span style="font-weight:600;color:${cstyles[lev]};font-size:.85rem;margin-left:.5rem">${clabels[lev]}</span></h3>${incHtml?`<div class="item-list">${incHtml}</div>`:'<p style="color:var(--muted);font-size:.85rem">Solo nivel general registrado, sin incidentes detallados.</p>'}</div>`;
  });
  if(!any) html+='<div class="empty"><div class="big">⭐</div><p>Sin registros de conducta todavía.</p></div>';
  return html;
}

function renderParentSummary(groups){
  const byName={};
  groups.forEach(g=>{ const k=g.name.replace(/\s*·\s*Trim.*$/,'').trim(); if(!byName[k]) byName[k]={}; byName[k][g.trimestre||'—']=g; });
  let html=`<div class="panel"><h3>🏆 Resumen final por trimestre</h3><p class="sub">Promedio de ${escHtml(session.studentName)} en cada materia</p></div>`;
  const keys=Object.keys(byName);
  if(!keys.length) return html+'<div class="empty"><div class="big">📊</div><p>Sin datos</p></div>';
  keys.forEach(name=>{
    const trims=byName[name];
    const cells=['1','2','3'].map(t=>{
      const g=trims[t]; if(!g) return '<td class="num">—</td>';
      const s=getStudentInGroup(g); if(!s) return '<td class="num">—</td>';
      const avg=calcAvgForStudent(g,s.id);
      return `<td class="num">${_chipCalif(avg!==null?avg.toFixed(1):'')}</td>`;
    }).join('');
    let finalAvg=null;
    const avgs=['1','2','3'].map(t=>{ const g=trims[t]; if(!g) return null; const s=getStudentInGroup(g); if(!s) return null; return calcAvgForStudent(g,s.id); }).filter(x=>x!==null);
    if(avgs.length) finalAvg=avgs.reduce((a,b)=>a+b,0)/avgs.length;
    html+=`<div class="panel"><div class="grades-wrap"><table class="grades-table"><thead><tr><th>Materia</th><th class="num"><span class="trim-chip t1">T1</span></th><th class="num"><span class="trim-chip t2">T2</span></th><th class="num"><span class="trim-chip t3">T3</span></th><th class="final">Final</th></tr></thead><tbody><tr><td><strong>${escHtml(name)}</strong></td>${cells}<td class="final">${_chipCalif(finalAvg!==null?finalAvg.toFixed(1):'')}</td></tr></tbody></table></div></div>`;
  });
  return html;
}
